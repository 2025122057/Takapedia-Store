<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="container my-4">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom shadow-sm mb-4">
    <div class="container-fluid">
        <a class="navbar-brand d-flex align-items-center" href="dashboard.html">
            <img src="assets/images/logo.png" alt="Logo" width="40" height="40" class="me-2">
            <span class="text-white fw-bold">Takapedia Store</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarMenu">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link text-white active" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="products.html">Products</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="orders.html">Orders</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="customers.html">Customers</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="index.html">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<!-- Stats Cards -->
<div class="row g-3 mb-4">
    <div class="col-lg-4 col-md-6 col-sm-12">
        <div class="card text-center p-3 shadow">
            <h5>Total Products</h5>
            <h2 id="totalProducts"></h2>
        </div>
    </div>
    <div class="col-lg-4 col-md-6 col-sm-12">
        <div class="card text-center p-3 shadow">
            <h5>Total Stock</h5>
            <h2 id="totalStock"></h2>
        </div>
    </div>
    <div class="col-lg-4 col-md-6 col-sm-12">
        <div class="card text-center p-3 shadow">
            <h5>Total Sales (RM)</h5>
            <h2 class="text-success" id="totalSales"></h2>
        </div>
    </div>
</div>

<!-- Charts Section -->
<div class="row g-4 mb-4">
    <div class="col-12">
        <h3 class="mb-3 white-title">Product Stocks</h3>
        <canvas id="stockChart" style="width:100%; max-height:300px;"></canvas>
    </div>
    <div class="col-12">
        <h3 class="mb-3 white-title">Sales by Customers</h3>
        <div class="pie-wrapper" style="max-width:400px; margin:auto;">
            <canvas id="salesPieChart"></canvas>
        </div>
    </div>
</div>

<footer class="text-center mt-4">&copy; 2025 Takapedia Store | All Right Reserved</footer>

<script>
// ----- Data -----
const products = [
    {name:"T-Shirt", stock:20},
    {name:"Jeans", stock:15},
    {name:"Bag", stock:8},
    {name:"Hat", stock:30},
    {name:"Sunglasses", stock:5},
    {name:"Sneakers", stock:12},
    {name:"Watch", stock:25}
];

const orders = [
    {customer:"Iman", qty:1, price:120, status:"Delivered"},
    {customer:"Zarul", qty:1, price:90, status:"Pending"},
    {customer:"Rusyaidi", qty:2, price:70, status:"Shipped"},
    {customer:"Dharif", qty:1, price:85, status:"Cancelled"},
    {customer:"Afiq", qty:3, price:25, status:"Delivered"}
];

// ----- Stats -----
document.getElementById('totalProducts').textContent = products.length;
document.getElementById('totalStock').textContent = products.reduce((a,p)=>a+p.stock,0);
document.getElementById('totalSales').textContent = orders
    .filter(o=>["Delivered","Shipped"].includes(o.status))
    .reduce((a,o)=>a+o.qty*o.price,0);

// ----- Stock Bar Chart -----
const stockData = products.map(p=>p.stock);
const stockColors = stockData.map(s => s<13 ? 'rgba(255,0,0,0.6)' : 'rgba(54,162,235,0.6)');

new Chart(document.getElementById('stockChart').getContext('2d'), {
    type: 'bar',
    data: {
        labels: products.map(p=>p.name),
        datasets:[{label:'Stock Quantity', data: stockData, backgroundColor: stockColors}]
    },
    options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{y:{beginAtZero:true}}
    }
});

// ----- Sales Pie Chart -----
const customerSales = {Iman:0,Zarul:0,Rusyaidi:0,Dharif:0,Afiq:0};
orders.forEach(o=> { if(["Delivered","Shipped"].includes(o.status)) customerSales[o.customer] += o.qty*o.price; });

new Chart(document.getElementById('salesPieChart').getContext('2d'),{
    type:'pie',
    data:{
        labels:Object.keys(customerSales),
        datasets:[{
            data:Object.values(customerSales),
            backgroundColor:['#FF6384','#36A2EB','#FFCE56','#4BC0C0','#9966FF']
        }]
    },
    options:{
        responsive:true,
        maintainAspectRatio:true,
        plugins:{legend:{position:'bottom'}}
    }
});
</script>

<!-- Include Bootstrap JS bundle for mobile navbar toggle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</body>
</html>
